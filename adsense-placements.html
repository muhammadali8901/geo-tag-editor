<!-- Header Banner Ad (728x90) - Place after site header -->
<div style="text-align:center; margin:20px 0; background:#f8f9fa; padding:10px; border:1px solid #dee2e6; border-radius:4px;">
  <!-- AdSense Code - Replace with your actual ad code -->
  <ins class="adsbygoogle"
       style="display:inline-block;width:728px;height:90px"
       data-ad-client="ca-pub-0000000000000000"
       data-ad-slot="header-banner"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<!-- Sticky Footer Ad (320x50) - Fixed at bottom on mobile -->
<div id="sticky-ad" style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;padding:10px;text-align:center;z-index:1000;display:none;">
  <!-- AdSense Code - Replace with your actual ad code -->
  <ins class="adsbygoogle"
       style="display:inline-block;width:320px;height:50px"
       data-ad-client="ca-pub-0000000000000000"
       data-ad-slot="mobile-footer"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
  <button onclick="document.getElementById('sticky-ad').style.display='none'" style="position:absolute;top:5px;right:5px;background:none;border:none;font-size:16px;cursor:pointer;">×</button>
</div>

<script>
// Show sticky ad on mobile devices only
if(window.innerWidth <= 768) {
  document.getElementById('sticky-ad').style.display = 'block';
}
</script>
