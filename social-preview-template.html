<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        .social-preview {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0284c7 0%, #6366f1 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 40px;
            box-sizing: border-box;
        }
        .emoji { font-size: 60px; margin-bottom: 20px; }
        .title { font-size: 48px; font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .subtitle { font-size: 24px; font-weight: 600; margin-bottom: 30px; opacity: 0.9; }
        .features { font-size: 18px; margin-bottom: 40px; opacity: 0.8; }
        .url { font-size: 20px; font-weight: 700; background: rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="social-preview">
        <div class="emoji">🚀</div>
        <div class="title">FREE SEO TOOL</div>
        <div class="subtitle">Geo Tag Editor</div>
        <div class="features">Boost Local Rankings FAST!<br>
        Edit, add, or remove GPS location data from images<br>
        100% Free • No Login Required</div>
        <div class="url">geotagseditor.online</div>
    </div>
</body>
</html>
