<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg1)" rx="8"/>
  <!-- Browser chrome -->
  <rect x="20" y="20" width="600" height="320" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="20" width="600" height="40" rx="8" fill="#f8fafc"/>
  <rect x="20" y="48" width="600" height="12" fill="#f8fafc"/>
  <circle cx="44" cy="40" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="62" cy="40" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="80" cy="40" r="6" fill="#10b981" opacity="0.7"/>
  <!-- Drop zone -->
  <rect x="60" y="80" width="520" height="220" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Cloud upload icon -->
  <g transform="translate(285,130)">
    <ellipse cx="35" cy="28" rx="30" ry="20" fill="#bae6fd"/>
    <ellipse cx="20" cy="35" rx="18" ry="14" fill="#bae6fd"/>
    <ellipse cx="55" cy="36" rx="14" ry="11" fill="#bae6fd"/>
    <polygon points="35,10 45,28 40,28 40,50 30,50 30,28 25,28" fill="#0284c7"/>
  </g>
  <!-- Text labels -->
  <text x="320" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#0f172a" font-weight="600">Drag &amp; Drop Your Photos Here</text>
  <text x="320" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">or click to browse — supports JPEG/JPG</text>
  <!-- Upload button -->
  <rect x="240" y="260" width="160" height="36" rx="8" fill="#0284c7"/>
  <text x="320" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">Choose Files</text>
</svg>
