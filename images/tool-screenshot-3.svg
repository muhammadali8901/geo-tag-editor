  <line x1="40" y1="120" x2="600" y2="120" stroke="#c8e6c8" stroke-width="1"/>
  <line x1="40" y1="170" x2="600" y2="170" stroke="#c8e6c8" stroke-width="1"/>
  <line x1="40" y1="220" x2="600" y2="220" stroke="#c8e6c8" stroke-width="1"/>
  <line x1="40" y1="270" x2="600" y2="270" stroke="#c8e6c8" stroke-width="1"/>
  <line x1="160" y1="70" x2="160" y2="320" stroke="#c8e6c8" stroke-width="1"/>
  <line x1="280" y1="70" x2="280" y2="320" stroke="#c8e6c8" stroke-width="1"/>
  <line x1="400" y1="70" x2="400" y2="320" stroke="#c8e6c8" stroke-width="1"/>
  <line x1="520" y1="70" x2="520" y2="320" stroke="#c8e6c8" stroke-width="1"/>
  <!-- Roads suggestion -->
  <path d="M 40 195 Q 150 185 280 195 Q 400 205 600 195" stroke="#b0c4b0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 280 70 Q 275 150 280 195 Q 285 240 280 320" stroke="#b0c4b0" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Map marker pin -->
  <g transform="translate(310,165)">
    <path d="M0,-28 C-14,-28 -24,-18 -24,-6 C-24,8 0,28 0,28 C0,28 24,8 24,-6 C24,-18 14,-28 0,-28 Z" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
