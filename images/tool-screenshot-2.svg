<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg2)" rx="8"/>
  <rect x="20" y="20" width="600" height="320" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="20" y="20" width="600" height="40" rx="8" fill="#f8fafc"/>
  <rect x="20" y="48" width="600" height="12" fill="#f8fafc"/>
  <circle cx="44" cy="40" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="62" cy="40" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="80" cy="40" r="6" fill="#10b981" opacity="0.7"/>
  <!-- Section title -->
  <text x="60" y="90" font-family="system-ui,sans-serif" font-size="15" fill="#0f172a" font-weight="700">Set GPS Coordinates</text>
  <!-- Latitude field -->
  <text x="60" y="118" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Latitude</text>
  <rect x="60" y="124" width="230" height="36" rx="6" fill="#f8fafc" stroke="#0284c7" stroke-width="2"/>
  <text x="76" y="147" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a">48.8566</text>
  <!-- Longitude field -->
  <text x="320" y="118" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Longitude</text>
  <rect x="320" y="124" width="240" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="336" y="147" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a">2.3522</text>
  <!-- EXIF metadata table -->
  <rect x="60" y="178" width="500" height="28" rx="4" fill="#f1f5f9"/>
  <text x="76" y="197" font-family="system-ui,sans-serif" font-size="12" fill="#475569">GPS Latitude</text>
  <text x="300" y="197" font-family="system-ui,sans-serif" font-size="12" fill="#0284c7">48°51'23.76" N</text>
  <rect x="60" y="208" width="500" height="28" rx="4" fill="#ffffff"/>
  <text x="76" y="227" font-family="system-ui,sans-serif" font-size="12" fill="#475569">GPS Longitude</text>
  <text x="300" y="227" font-family="system-ui,sans-serif" font-size="12" fill="#0284c7">2°21'7.92" E</text>
  <rect x="60" y="238" width="500" height="28" rx="4" fill="#f1f5f9"/>
  <text x="76" y="257" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Camera</text>
  <text x="300" y="257" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">Apple iPhone 15 Pro</text>
  <!-- Action buttons -->
  <rect x="60" y="290" width="200" height="36" rx="8" fill="#0284c7"/>
  <text x="160" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">Apply Coordinates</text>
  <rect x="278" y="290" width="160" height="36" rx="8" fill="#ef4444"/>
  <text x="358" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">Remove Geotag</text>
</svg>
