    <path d="M176 131c-24.853 0-45 20.147-45 45 0 33.75 45 83.571 45 83.571S221 209.75 221 176c0-24.853-20.147-45-45-45zm0 61.071a16.071 16.071 0 110-32.142 16.071 16.071 0 010 32.142z" fill="#fff"/>
