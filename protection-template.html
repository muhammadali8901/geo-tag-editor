<!-- Protection Template - Add to all HTML files -->
<!-- Add this script tag before closing </body> tag in all HTML files -->
<script src="/js/protection.js"></script>
<script>
// Additional protection for this page
(function() {
    'use strict';
    
    // Disable right click
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });
    
    // Disable text selection
    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
        return false;
    });
    
    // Disable copy
    document.addEventListener('copy', function(e) {
        e.preventDefault();
        return false;
    });
    
    // Disable view source shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.keyCode === 85) { // Ctrl+U
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { // Ctrl+Shift+I
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { // Ctrl+Shift+J
            e.preventDefault();
            return false;
        }
        if (e.keyCode === 123) { // F12
            e.preventDefault();
            return false;
        }
    });
    
    // Disable developer tools
    setInterval(function() {
        if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
            window.close();
            window.location.replace("about:blank");
        }
    }, 500);
    
    // Add watermark
    function addWatermark() {
        var watermark = document.createElement('div');
        watermark.innerHTML = '© Geo Tags Editor - Protected Content';
        watermark.style.position = 'fixed';
        watermark.style.bottom = '10px';
        watermark.style.right = '10px';
        watermark.style.color = 'rgba(0,0,0,0.1)';
        watermark.style.fontSize = '12px';
        watermark.style.pointerEvents = 'none';
        watermark.style.zIndex = '999999';
        document.body.appendChild(watermark);
    }
    
    addWatermark();
    
})();
</script>
