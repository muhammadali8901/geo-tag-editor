<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate Input Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .field { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 200px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Coordinate Input Test</h1>
    <div class="field">
        <label for="latInput">Latitude:</label>
        <input type="number" id="latInput" step="any" min="-90" max="90" placeholder="e.g. 48.8566">
    </div>
    <div class="field">
        <label for="lngInput">Longitude:</label>
        <input type="number" id="lngInput" step="any" min="-180" max="180" placeholder="e.g. 2.3522">
    </div>
    <button onclick="testCoordinateInput()">Test Coordinate Input</button>
    <div id="result">
        <p>Click the button to test if coordinate inputs are working...</p>
    </div>

    <script>
        function testCoordinateInput() {
            const latInput = document.getElementById('latInput');
            const lngInput = document.getElementById('lngInput');
            const result = document.getElementById('result');
            
            console.log('Testing coordinate input...');
            console.log('Latitude input element:', latInput);
            console.log('Longitude input element:', lngInput);
            
            if (latInput && lngInput) {
                // Test setting values
                latInput.value = '48.8566';
                lngInput.value = '2.3522';
                
                console.log('Set latitude to:', latInput.value);
                console.log('Set longitude to:', lngInput.value);
                console.log('Latitude input value after setting:', latInput.value);
                console.log('Longitude input value after setting:', lngInput.value);
                
                result.innerHTML = '<p><strong>✅ SUCCESS:</strong> Coordinate input is working! Values set to Latitude: ' + latInput.value + ', Longitude: ' + lngInput.value + '</p>';
                result.style.background = '#d4edda';
                result.style.color = '#155724';
            } else {
                console.log('ERROR: Input elements not found!');
                result.innerHTML = '<p><strong>❌ ERROR:</strong> Could not find input elements!</p>';
                result.style.background = '#f8d7da';
                result.style.color = '#721c24';
            }
        }
    </script>
</body>
</html>
